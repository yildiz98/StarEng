<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StarEng • Öğrenme Yolu</title><link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="brand">★ StarEng</div><div class="badge">0'dan A1'e</div></header>
<main>
<section id="roadmap" class="page active">
  <div class="hero"><span>STAR ENG ÖĞRENME YOLU</span><h1>Adım adım A1 seviyesine ulaş.</h1>
  <p>Alfabe, sayılar, renkler, kelimeler, fiiller ve cümle kurma mantığıyla sıfırdan başla.</p></div>
  <div class="path">
    <button class="step open" onclick="openModule('baslangic')"><b>01</b><div><h2>Başlangıç</h2><p>Alfabe • Sayılar • Renkler</p></div><em>Başla →</em></button>
    <button class="step open" onclick="openModule('kelimeler')"><b>02</b><div><h2>Kelimeler</h2><p>Aile • Hayvanlar • Meyveler • Eşyalar</p></div><em>Aç →</em></button>
    <button class="step open" onclick="openModule('fiiller')"><b>03</b><div><h2>Fiiller</h2><p>be • have • go • eat • drink • read • write...</p></div><em>Aç →</em></button>
    <button class="step open" onclick="openModule('cumle')"><b>04</b><div><h2>Cümle Kurma</h2><p>I am... • I have... • I like... • I want...</p></div><em>Aç →</em></button>
    <button class="step open" onclick="openModule('konusma')"><b>05</b><div><h2>Günlük Konuşma</h2><p>Tanışma • Alışveriş • Restoran • Yol sorma</p></div><em>Aç →</em></button>
    <button class="step final" onclick="openModule('final')"><b>06</b><div><h2>A1 Final Testi</h2><p>Kelime • Yazma • Fiil • Cümle • Diyalog</p></div><em>Test →</em></button>
  </div>
</section>

<section id="module" class="page">
<button class="back" onclick="showRoadmap()">← Öğrenme Yolu</button>
<div class="module-head"><small id="moduleNo"></small><h1 id="moduleTitle"></h1><p id="moduleDesc"></p></div>
<div id="moduleContent" class="cards"></div>
</section>

<section id="study" class="page">
<button class="back" id="studyBack">← Geri</button>
<div class="study-card">
<div class="meta"><span id="studyTitle"></span><span id="count"></span></div>
<h1 id="word"></h1><h2 id="meaning"></h2>
<div class="example"><b id="sentence"></b><span id="translation"></span></div>
<div class="actions"><button onclick="prevWord()">← Önceki</button><button class="gold" onclick="markLearned()">✓ Öğrendim</button><button onclick="nextWord()">Sonraki →</button></div>
<p id="status"></p>
</div>
</section>
</main>
<footer>StarEng • 0'dan A1'e İngilizce Öğrenme Yolu</footer>
<script src="./lesson-01.js"></script>
<script src="./lesson-02.js"></script>
<script src="./lesson-alphabet.js"></script>
<script src="./lesson-numbers.js"></script>
<script src="./lesson-colors.js"></script>
<script src="./lesson-animals.js"></script>
<script src="./lesson-fruits.js"></script>
<script src="./lesson-objects.js"></script>
<script src="./lesson-verbs.js"></script>
<script src="./app.js"></script>
</body></html>
